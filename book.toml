[book]
title = "인공지능 기초 (Fundamentals of Artificial Intelligence)"
authors = ["Lead: 강희성 (Kang Heesung)", "Maintainer / Developer: 박성모 (Park Sungmo)"]
description = "파이썬부터 딥러닝까지, AI 기초를 한 권에 담은 책"
language = "ko"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "dark"

[output.html.print]
enable = true
